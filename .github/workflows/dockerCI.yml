name: Python CI
 
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
 
jobs:
  test-in-container:
    runs-on: ubuntu-latest
 
    steps:
      - name: Check out code
        uses: actions/checkout@v4
 
      - name: Build Docker image
        run: docker build -t pytest_app:v1 .
 
      - name: Run tests inside container
        run: |
          docker run --rm pytest_app:v1 \
            pytest test_engament.py -v \
            --html=report.html \
            --self-contained-html
 
      - name: Copy report out of container
        if: always()
        run: |
          docker run --rm -v ${{ github.workspace }}:/out pytest_app:v1 \
            cp report.html /out/report.html || true
 
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-html-report
          path: report.html